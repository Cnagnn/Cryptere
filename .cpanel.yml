---
deployment:
  tasks:
    - export DEPLOYPATH=/home/fkdzqxmc/cryptere
    - export PUBLICPATH=/home/fkdzqxmc/public_html
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/mkdir -p $PUBLICPATH
    - cd $DEPLOYPATH && /usr/local/bin/php /home/fkdzqxmc/composer.phar install --no-dev --prefer-dist --optimize-autoloader --no-interaction
    - cd $DEPLOYPATH && /usr/local/bin/php artisan optimize:clear
    - cd $DEPLOYPATH && if [ -f package-lock.json ]; then npm ci; else npm install; fi
    - cd $DEPLOYPATH && npm run build
    - /bin/rm -rf $PUBLICPATH/build $PUBLICPATH/fonts $PUBLICPATH/storage
    - /bin/cp -a $DEPLOYPATH/public/. $PUBLICPATH/
    - /bin/sed -i "s#__DIR__.'/../storage/framework/maintenance.php'#__DIR__.'/../cryptere/storage/framework/maintenance.php'#" $PUBLICPATH/index.php
    - /bin/sed -i "s#__DIR__.'/../vendor/autoload.php'#__DIR__.'/../cryptere/vendor/autoload.php'#" $PUBLICPATH/index.php
    - /bin/sed -i "s#__DIR__.'/../bootstrap/app.php'#__DIR__.'/../cryptere/bootstrap/app.php'#" $PUBLICPATH/index.php
    - cd $DEPLOYPATH && /usr/local/bin/php artisan migrate --force
    - cd $DEPLOYPATH && /usr/local/bin/php artisan storage:link || true
    - cd $DEPLOYPATH && /usr/local/bin/php artisan optimize
