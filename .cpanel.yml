# ============================================================
# Cryptere — cPanel Git Deploy Pipeline (HyperCloudHost)
# ============================================================
# Triggered by cPanel Git Version Control after `git pull`.
# Each task runs in a FRESH shell, so:
#   - `cd` and `export` from one task do NOT persist to the next.
#   - We hardcode absolute paths everywhere.
#
# Env assumptions on the host (verified 2026-06-15, HyperCloudHost):
#   User       fkdzqxmc
#   App path   /home/fkdzqxmc/public_html/cryptere
#   PHP        /usr/local/bin/php                   (8.4.21)
#   Composer   /opt/alt/php84/usr/bin/composer      (system)
#
# IMPORTANT: We DO NOT run `npm install` or `npm run build` on the server.
# Cloud Mini hosting has insufficient RAM (~512MB-1GB LVE limit) for Vite
# WebAssembly allocation (~800MB-1.5GB peak). Frontend build is performed
# LOCALLY and committed to git (public/build/ is NOT gitignored).
#
# Deploy order:
#   1. composer install                    → vendor/ ready
#   2. wayfinder:generate                  → resources/js/{actions,routes} (gitignored, must regenerate)
#   3. artisan optimize:clear              → drop stale caches before re-caching
#   4. config/route/view/event cache       → fast cold-start in production
#   5. migrate --force                     → apply any new schema (idempotent)
#   6. queue:restart                       → workers pick up new code on next tick
#   7. storage:link                        → public/storage symlink (idempotent)
#   8. chmod                               → ensure storage/ + bootstrap/cache/ writable
#
# We deliberately DO NOT run `php artisan db:seed` here — seeding production
# is a one-shot, manual, console-supervised operation.
---
deployment:
  tasks:
    # 1. PHP dependencies (production-only, optimized autoloader)
    - /opt/alt/php84/usr/bin/composer install --working-dir=/home/fkdzqxmc/public_html/cryptere --no-dev --optimize-autoloader --no-interaction --prefer-dist

    # 2. Generate Wayfinder TypeScript routes/actions (gitignored, must rebuild every deploy)
    - /usr/local/bin/php /home/fkdzqxmc/public_html/cryptere/artisan wayfinder:generate --with-form --no-interaction

    # 3. Drop ALL Laravel caches (config/route/view/event/compiled) so step 4 sees fresh code
    - /usr/local/bin/php /home/fkdzqxmc/public_html/cryptere/artisan optimize:clear

    # 4. Re-cache for production performance
    - /usr/local/bin/php /home/fkdzqxmc/public_html/cryptere/artisan config:cache
    - /usr/local/bin/php /home/fkdzqxmc/public_html/cryptere/artisan route:cache
    - /usr/local/bin/php /home/fkdzqxmc/public_html/cryptere/artisan view:cache
    - /usr/local/bin/php /home/fkdzqxmc/public_html/cryptere/artisan event:cache

    # 5. Apply pending migrations (--force skips production confirmation prompt)
    - /usr/local/bin/php /home/fkdzqxmc/public_html/cryptere/artisan migrate --force --no-interaction

    # 6. Signal queue workers to restart so they pick up the new code on next tick
    - /usr/local/bin/php /home/fkdzqxmc/public_html/cryptere/artisan queue:restart

    # 7. Storage symlink (idempotent — safe to run every deploy)
    - /usr/local/bin/php /home/fkdzqxmc/public_html/cryptere/artisan storage:link --no-interaction

    # 8. Filesystem permissions (Laravel needs storage/ + bootstrap/cache/ writable)
    - /bin/chmod -R 775 /home/fkdzqxmc/public_html/cryptere/storage /home/fkdzqxmc/public_html/cryptere/bootstrap/cache
