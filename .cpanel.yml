# ============================================================
# Cryptere — cPanel Git Deploy Pipeline
# ============================================================
# Triggered by cPanel Git Version Control after `git pull`.
# Each task runs in a FRESH shell, so:
#   - `cd` and `export` from one task do NOT persist to the next.
#   - We hardcode absolute paths everywhere.
#   - Node tasks wrap the command in `bash -lc "source <activate> && ..."`
#     because npm/node only exist inside the cPanel Node.js virtualenv.
#
# Env assumptions on the host (verified 2026-06-13):
#   PHP        /usr/local/bin/php                   (8.4.21)
#   Composer   /home/fkdzqxmc/bin/composer         (2.9.8)
#   Node 22    activated via cPanel Node.js App
#              source /home/fkdzqxmc/nodevenv/public_html/Cryptere/22/bin/activate
#
# Deploy order matters:
#   1. composer install                   → vendor/ ready
#   2. wayfinder:generate                  → /resources/js/{actions,routes} (gitignored, must regenerate)
#   3. npm install + npm run build         → /public/build (Vite needs Wayfinder files from step 2)
#   4. artisan optimize:clear              → drop stale caches before re-caching
#   5. config/route/view/event cache       → fast cold-start in production
#   6. migrate --force                     → apply any new schema (idempotent)
#   7. queue:restart                       → workers pick up new code on next tick
#
# We deliberately DO NOT run `php artisan db:seed` here — seeding production
# is a one-shot, manual, console-supervised operation.
---
deployment:
  tasks:
    # 1. PHP dependencies (production-only, optimized autoloader)
    - /home/fkdzqxmc/bin/composer install --working-dir=/home/fkdzqxmc/public_html/Cryptere --no-dev --optimize-autoloader --no-interaction --prefer-dist

    # 2. Generate Wayfinder TypeScript routes/actions (gitignored, must rebuild every deploy)
    - /usr/local/bin/php /home/fkdzqxmc/public_html/Cryptere/artisan wayfinder:generate --with-form --no-interaction

    # 3a. JS dependencies — install ALL deps (incl. devDependencies). Vite,
    #     @vitejs/plugin-react, laravel-vite-plugin, and @laravel/vite-plugin-
    #     wayfinder live in devDependencies; the production build needs them
    #     to compile assets. The /node_modules tree is gitignored and discarded
    #     after step 3b, so disk impact is temporary.
    - bash -lc "source /home/fkdzqxmc/nodevenv/public_html/Cryptere/22/bin/activate && cd /home/fkdzqxmc/public_html/Cryptere && npm ci --no-audit --no-fund"

    # 3b. Build Vite assets to /public/build (consumed by @vite() in Blade)
    - bash -lc "source /home/fkdzqxmc/nodevenv/public_html/Cryptere/22/bin/activate && cd /home/fkdzqxmc/public_html/Cryptere && npm run build"

    # 4. Drop ALL Laravel caches (config/route/view/event/compiled) so step 5 sees fresh code
    - /usr/local/bin/php /home/fkdzqxmc/public_html/Cryptere/artisan optimize:clear

    # 5. Re-cache for production performance
    - /usr/local/bin/php /home/fkdzqxmc/public_html/Cryptere/artisan config:cache
    - /usr/local/bin/php /home/fkdzqxmc/public_html/Cryptere/artisan route:cache
    - /usr/local/bin/php /home/fkdzqxmc/public_html/Cryptere/artisan view:cache
    - /usr/local/bin/php /home/fkdzqxmc/public_html/Cryptere/artisan event:cache

    # 6. Apply pending migrations (--force skips production confirmation prompt)
    - /usr/local/bin/php /home/fkdzqxmc/public_html/Cryptere/artisan migrate --force --no-interaction

    # 7. Signal queue workers to restart so they pick up the new code on next tick
    - /usr/local/bin/php /home/fkdzqxmc/public_html/Cryptere/artisan queue:restart

    # 8. Storage symlink (idempotent — safe to run every deploy)
    - /usr/local/bin/php /home/fkdzqxmc/public_html/Cryptere/artisan storage:link --no-interaction

    # 9. Filesystem permissions (Laravel needs storage/ + bootstrap/cache/ writable)
    - /bin/chmod -R 775 /home/fkdzqxmc/public_html/Cryptere/storage /home/fkdzqxmc/public_html/Cryptere/bootstrap/cache
